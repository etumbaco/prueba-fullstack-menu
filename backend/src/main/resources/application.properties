# ===== Aplicacion =====
spring.application.name=menu-backend
server.port=8080

# ===== Conexion MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/menu_db?useSSL=false&serverTimezone=America/Guayaquil&allowPublicKeyRetrieval=true
spring.datasource.username=menu_app
spring.datasource.password=MenuApp2026!

# ===== JPA / Hibernate =====
# 'none': el esquema lo gestiona nuestro script SQL, no Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Swagger UI =====
springdoc.swagger-ui.path=/swagger-ui.html
spring.jpa.open-in-view=false
